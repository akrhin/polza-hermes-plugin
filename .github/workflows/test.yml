name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hermes Agent (minimal)
        run: |
          pip install hermes-agent --quiet

      - name: Install plugin in Hermes
        run: |
          mkdir -p ~/.hermes/plugins/model-providers
          ln -sf "${{ github.workspace }}/plugins/model-providers/polza" \
                 ~/.hermes/plugins/model-providers/polza

      - name: Install deps
        run: |
          pip install pytest ruff bandit --quiet

      - name: Lint (ruff)
        run: |
          ruff check plugins/ tests/

      - name: SAST (bandit)
        run: |
          bandit -r plugins/ -ll -q

      - name: Compile check
        run: |
          python -m compileall plugins/

      - name: Run unit tests
        run: |
          python -m pytest tests/ -q -v
