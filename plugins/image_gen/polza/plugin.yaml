name: polza
version: 1.0.1
description: "Polza.ai image generation backend via /v2/images/generations (OpenAI-compatible). Text-to-image only. Uses POLZA_API_KEY."
author: akrhin
kind: backend
requires_env:
  - name: POLZA_API_KEY
    description: "Polza.ai API key"
    url: "https://polza.ai/dashboard"
    secret: true
